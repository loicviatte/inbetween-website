<!doctype html><html><head><meta charset="utf-8"><title>Color — neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #0A0A0A; overflow: hidden; font-family: var(--font-sans); color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 14px; height: 220px; box-sizing: border-box; }
  .sw { border-radius: 8px; padding: 12px 10px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(255,255,255,.06); }
  .sw .name { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; opacity: .7; font-weight: 500; }
  .sw .hex { font-family: var(--font-mono); font-size: 10.5px; opacity: .85; }
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#000;color:#fff"><div class="name">1000</div><div class="hex">#000000</div></div>
  <div class="sw" style="background:#141414;color:#fff"><div class="name">900</div><div class="hex">#141414</div></div>
  <div class="sw" style="background:#1F1F1F;color:#fff"><div class="name">800</div><div class="hex">#1F1F1F</div></div>
  <div class="sw" style="background:#2A2A2A;color:#fff"><div class="name">700</div><div class="hex">#2A2A2A</div></div>
  <div class="sw" style="background:#5C5C5C;color:#fff"><div class="name">500</div><div class="hex">#5C5C5C</div></div>
  <div class="sw" style="background:#B5B5B5;color:#111"><div class="name">300</div><div class="hex">#B5B5B5</div></div>
  <div class="sw" style="background:#F7F6F3;color:#111"><div class="name">50</div><div class="hex">#F7F6F3</div></div>
</div>
</body></html>
