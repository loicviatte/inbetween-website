<!doctype html><html><head><meta charset="utf-8"><title>Logo — primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: var(--font-sans); }
  .card { padding: 28px 32px; display: flex; align-items: center; gap: 32px; height: 170px; box-sizing: border-box; }
  .logo { height: 72px; width: auto; display: block; }
  .meta { color: var(--fg-2); font-size: 13px; line-height: 1.5; }
  .meta strong { color: var(--fg-1); font-weight: 600; display: block; margin-bottom: 4px; font-size: 14px; letter-spacing: -.01em; }
  .eyebrow { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  .eyebrow::before { content: ""; display: inline-block; width: 14px; height: 1px; background: currentColor; margin-right: 8px; vertical-align: middle; }
</style></head><body>
<div class="card">
  <img class="logo" src="../assets/logo-wordmark-white.png" alt="InBetween logo">
  <div class="meta">
    <div class="eyebrow">Primary lockup</div>
    <strong>Icon + wordmark, on black</strong>
    The default brand signature. Use whenever there is room for the full lockup and a dark surface is available.
  </div>
</div>
</body></html>
