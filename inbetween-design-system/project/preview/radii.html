<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 22px 22px 18px; box-sizing: border-box; height: 170px; }
  .tile { background: #1F1F1F; border: 1px solid rgba(255,255,255,.08); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .tile .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .tile .n { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-3); }
</style></head><body>
<div class="grid">
  <div class="tile" style="border-radius:0"><div class="n">None</div><div class="v">0</div></div>
  <div class="tile" style="border-radius:4px"><div class="n">sm</div><div class="v">4</div></div>
  <div class="tile" style="border-radius:8px"><div class="n">md</div><div class="v">8</div></div>
  <div class="tile" style="border-radius:14px"><div class="n">lg</div><div class="v">14</div></div>
  <div class="tile" style="border-radius:999px"><div class="n">pill</div><div class="v">999</div></div>
</div>
</body></html>
