<!doctype html><html><head><meta charset="utf-8"><title>Form — inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: var(--font-sans); padding: 22px 28px; box-sizing: border-box; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 12px; color: var(--fg-2); letter-spacing: .01em; font-weight: 400; }
  input[type=text] { background: #141414; border: 1px solid rgba(255,255,255,.12); color: #fff; padding: 11px 14px; border-radius: 8px; font-family: var(--font-sans); font-size: 14px; outline: none; transition: all 120ms; }
  input[type=text]:focus { border-color: #F0C24A; box-shadow: 0 0 0 3px rgba(240,194,74,.18); }
  .err input { border-color: rgba(208,106,90,.6); }
  .hint { font-size: 11.5px; color: var(--fg-3); }
  .err .hint { color: #D06A5A; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style></head><body>
<div class="row">
  <div>
    <div class="field"><label>Email</label><input type="text" value="hello@inbetween.co"></div>
    <div class="field err"><label>Password</label><input type="text" value="••••"><div class="hint">Needs at least eight characters.</div></div>
  </div>
  <div>
    <div class="field"><label>Workspace</label><input type="text" placeholder="e.g. studio, personal"></div>
    <div class="field"><label>Focus</label><input type="text" value="The space between" style="border-color:#F0C24A;box-shadow:0 0 0 3px rgba(240,194,74,.18)"><div class="hint" style="color:#F0C24A">Focused</div></div>
  </div>
</div>
</body></html>
