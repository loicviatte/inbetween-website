<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: var(--font-sans); padding: 18px; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .card { background: #141414; border: 1px solid rgba(255,255,255,.1); border-radius: 14px; padding: 18px; box-shadow: inset 0 1px 0 rgba(255,255,255,.06); }
  .card.primary { border-color: #F0C24A; background: #141414; }
  .card.light { background: #F7F6F3; color: #111; border-color: rgba(0,0,0,.12); box-shadow: none; }
  .eyebrow { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: #F0C24A; font-weight: 500; margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
  .eyebrow::before { content: ""; width: 14px; height: 1px; background: currentColor; }
  .card.light .eyebrow { color: #8A7020; }
  h3 { font-family: var(--font-display); font-weight: 600; font-size: 18px; margin: 0 0 6px; letter-spacing: -.01em; }
  p { font-size: 12.5px; line-height: 1.55; color: var(--fg-2); margin: 0; }
  .card.light p { color: #5C5C5C; }
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="eyebrow">Default</div>
    <h3>Handoff space</h3>
    <p>Where the interesting stuff lives, between the systems you already use.</p>
  </div>
  <div class="card primary">
    <div class="eyebrow">Featured</div>
    <h3>Gold-border</h3>
    <p>The single primary card in a view. Reserved — never more than one at once.</p>
  </div>
  <div class="card light">
    <div class="eyebrow">Inverse</div>
    <h3>Cream surface</h3>
    <p>Warm paper. Used sparingly for editorial or long-read surfaces.</p>
  </div>
</div>
</body></html>
