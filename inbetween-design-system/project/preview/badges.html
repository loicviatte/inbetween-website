<!doctype html><html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: var(--font-sans); padding: 26px 28px; box-sizing: border-box; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px; font-size: 11.5px; font-weight: 500; letter-spacing: .02em; border: 1px solid transparent; }
  .b-gold { background: rgba(240,194,74,.14); color: #F0C24A; border-color: rgba(240,194,74,.3); }
  .b-gold-solid { background: #F0C24A; color: #111; }
  .b-outline { border-color: rgba(255,255,255,.2); color: var(--fg-2); }
  .b-success { background: rgba(127,183,126,.14); color: #7FB77E; border-color: rgba(127,183,126,.3); }
  .b-danger { background: rgba(208,106,90,.14); color: #D06A5A; border-color: rgba(208,106,90,.3); }
  .b-info { background: rgba(111,168,200,.14); color: #6FA8C8; border-color: rgba(111,168,200,.3); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .b-square { border-radius: 4px; text-transform: uppercase; letter-spacing: .1em; font-size: 10px; padding: 4px 8px; font-weight: 500; }
</style></head><body>
<div class="row">
  <span class="badge b-gold"><span class="dot"></span>Live</span>
  <span class="badge b-success"><span class="dot"></span>Connected</span>
  <span class="badge b-danger"><span class="dot"></span>Offline</span>
  <span class="badge b-info"><span class="dot"></span>Syncing</span>
  <span class="badge b-outline">Draft</span>
</div>
<div class="row">
  <span class="badge b-gold-solid">New</span>
  <span class="badge b-square b-gold">Beta</span>
  <span class="badge b-square b-outline" style="color:#fff;border-color:rgba(255,255,255,.25)">v1.2</span>
  <span class="badge b-square" style="background:#F0C24A;color:#111">Primary</span>
</div>
</body></html>
