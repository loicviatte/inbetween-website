<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; padding: 20px 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 44px 1fr 60px; align-items: center; gap: 14px; padding: 5px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { height: 10px; background: var(--gold-400); border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); text-align: right; }
</style></head><body>
  <div class="row"><div class="tok">1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="tok">2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="tok">3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="tok">4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="tok">6</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="tok">8</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="tok">12</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="tok">16</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
  <div class="row"><div class="tok">24</div><div class="bar" style="width:96px"></div><div class="px">96px</div></div>
</body></html>
