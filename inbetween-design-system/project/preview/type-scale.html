<!doctype html><html><head><meta charset="utf-8"><title>Type — scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; padding: 20px 28px; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 8px 0; vertical-align: baseline; border-bottom: 1px solid rgba(255,255,255,.06); }
  td.sample { color: var(--fg-1); }
  td.label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: right; white-space: nowrap; padding-left: 16px; }
  tr:last-child td { border-bottom: 0; }
  .s1 { font-family: var(--font-display); font-weight: 600; font-size: 44px; letter-spacing: -.02em; line-height: 1.0; }
  .s2 { font-family: var(--font-display); font-weight: 600; font-size: 30px; letter-spacing: -.015em; line-height: 1.1; }
  .s3 { font-weight: 600; font-size: 22px; letter-spacing: -.01em; }
  .s4 { font-weight: 500; font-size: 18px; }
  .s5 { font-weight: 400; font-size: 15px; color: var(--fg-2); }
  .s6 { font-weight: 400; font-size: 12px; color: var(--fg-3); }
</style></head><body>
<table>
  <tr><td class="sample s1">Display</td><td class="label">600 · 44 / 1.0</td></tr>
  <tr><td class="sample s2">Heading 1</td><td class="label">600 · 30 / 1.1</td></tr>
  <tr><td class="sample s3">Heading 3</td><td class="label">600 · 22</td></tr>
  <tr><td class="sample s4">Subhead</td><td class="label">500 · 18</td></tr>
  <tr><td class="sample s5">Body — the quiet running voice</td><td class="label">400 · 15</td></tr>
  <tr><td class="sample s6">Micro label</td><td class="label">400 · 12</td></tr>
</table>
</body></html>
