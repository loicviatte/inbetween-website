<!doctype html><html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: var(--font-sans); padding: 22px 26px; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: #141414; border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 14px 16px; }
  .name { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; }
  .v { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: #fff; }
  .curve { height: 40px; position: relative; overflow: hidden; border-radius: 6px; background: #0A0A0A; }
  .curve svg { width: 100%; height: 100%; }
  .curve path { fill: none; stroke: #F0C24A; stroke-width: 1.5; }
  .d { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-2); margin-top: 6px; }
</style></head><body>
<div class="grid">
  <div class="card"><div class="name">Default</div><div class="v">ease-out · 220ms</div>
    <div class="curve"><svg viewBox="0 0 100 40" preserveAspectRatio="none"><path d="M0 38 C 20 36, 30 4, 100 2"/></svg></div>
    <div class="d">cubic-bezier(.2, .7, .2, 1)</div></div>
  <div class="card"><div class="name">Fast</div><div class="v">ease-out · 120ms</div>
    <div class="curve"><svg viewBox="0 0 100 40" preserveAspectRatio="none"><path d="M0 38 C 10 36, 20 4, 100 2"/></svg></div>
    <div class="d">hovers, color swaps</div></div>
  <div class="card"><div class="name">Slow</div><div class="v">ease-in-out · 420ms</div>
    <div class="curve"><svg viewBox="0 0 100 40" preserveAspectRatio="none"><path d="M0 38 C 40 38, 60 2, 100 2"/></svg></div>
    <div class="d">page transitions</div></div>
  <div class="card"><div class="name">Spring</div><div class="v">playful · sparing</div>
    <div class="curve"><svg viewBox="0 0 100 40" preserveAspectRatio="none"><path d="M0 38 C 20 -20, 60 10, 100 2"/></svg></div>
    <div class="d">onboarding moments only</div></div>
</div>
</body></html>
