<!doctype html><html><head><meta charset="utf-8"><title>Type — eyebrow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; padding: 28px 32px; box-sizing: border-box; font-family: var(--font-sans); }
  .eyebrow { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold-400); font-weight: 500; display: inline-flex; align-items: center; gap: 10px; }
  .eyebrow::before { content: ""; width: 22px; height: 1px; background: currentColor; }
  h2 { font-family: var(--font-display); font-weight: 600; font-size: 36px; letter-spacing: -.018em; line-height: 1.08; margin: 10px 0 8px; }
  .lead { font-weight: 300; font-size: 15px; line-height: 1.55; color: var(--fg-2); max-width: 520px; }
</style></head><body>
  <div class="eyebrow">The infinite / interrupted</div>
  <h2>A platform for work that lives between systems.</h2>
  <div class="lead">Handoffs, context, the spaces where things get lost. That's where InBetween starts.</div>
</body></html>
