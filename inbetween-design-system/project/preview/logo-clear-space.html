<!doctype html><html><head><meta charset="utf-8"><title>Logo — clear space</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #0A0A0A; overflow: hidden; font-family: var(--font-sans); color: #fff; }
  .card { padding: 24px 28px; height: 200px; box-sizing: border-box; display: flex; gap: 36px; align-items: center; }
  .demo { position: relative; flex: 0 0 auto; }
  .demo img { height: 64px; display: block; position: relative; z-index: 2; }
  .demo.wide img { height: 48px; }
  /* clear-space guides — 1x the cap height of the mark */
  .guide { position: absolute; inset: -10px; border: 1px dashed rgba(240,194,74,.45); border-radius: 4px; }
  .guide::before, .guide::after { content: ""; position: absolute; background: rgba(240,194,74,.45); }
  .guide::before { left: -4px; top: 50%; width: 8px; height: 1px; }
  .guide::after { top: -4px; left: 50%; width: 1px; height: 8px; }
  .meta { color: var(--fg-2); font-size: 12px; line-height: 1.55; max-width: 260px; }
  .meta strong { color: var(--fg-1); font-weight: 600; display: block; margin-bottom: 6px; font-size: 13px; letter-spacing: -.01em; }
  .rule { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent); margin-top: 10px; }
  .rule .bar { width: 18px; height: 1px; background: currentColor; }
</style></head><body>
<div class="card">
  <div class="demo">
    <div class="guide"></div>
    <img src="../assets/logo-icon-transparent.png">
  </div>
  <div class="demo wide">
    <div class="guide"></div>
    <img src="../assets/logo-wordmark-transparent-white.png">
  </div>
  <div class="meta">
    <strong>Clear space</strong>
    Give the mark room. Minimum padding on all sides equals half the cap-height of the wordmark. No type, no graphics, no edges inside this zone.
    <div class="rule"><span class="bar"></span>= ½× cap height</div>
  </div>
</div>
</body></html>
