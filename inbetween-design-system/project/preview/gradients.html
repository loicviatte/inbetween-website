<!doctype html><html><head><meta charset="utf-8"><title>Gradients & texture</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #0A0A0A; overflow: hidden; font-family: var(--font-sans); color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px; height: 220px; box-sizing: border-box; }
  .tile { border-radius: 10px; position: relative; overflow: hidden; padding: 14px; display: flex; flex-direction: column; justify-content: flex-end; }
  .tile .name { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 500; color: rgba(255,255,255,.9); }
  .tile .token { font-family: var(--font-mono); font-size: 10.5px; color: rgba(255,255,255,.6); margin-top: 4px; }
  .dark { background: var(--grad-dark); }
  .light { background: var(--grad-light); }
  .gold { background: var(--grad-gold); }
  .gold .name, .gold .token { color: rgba(0,0,0,.75); }
  .grain::after { content: ""; position: absolute; inset: 0; background-image: var(--grain-url); background-size: 180px 180px; opacity: .7; mix-blend-mode: overlay; pointer-events: none; }
</style></head><body>
<div class="grid">
  <div class="tile dark grain"><div class="name">Hero dark</div><div class="token">--grad-dark + grain</div></div>
  <div class="tile light grain"><div class="name">Elevated dark</div><div class="token">--grad-light + grain</div></div>
  <div class="tile gold"><div class="name">Gold</div><div class="token">--grad-gold</div></div>
</div>
</body></html>
