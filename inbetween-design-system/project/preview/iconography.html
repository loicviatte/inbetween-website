<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: var(--font-sans); padding: 22px 26px; box-sizing: border-box; }
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .eyebrow { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #F0C24A; font-weight: 500; }
  .note { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; align-items: center; justify-items: center; margin-bottom: 18px; }
  .row svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .row2 svg { stroke: #F0C24A; }
  .row3 svg { stroke: var(--fg-2); stroke-width: 1.5; width: 18px; height: 18px; }
</style></head><body>
