<!doctype html><html><head><meta charset="utf-8"><title>Type — display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; }
  .card { padding: 22px 28px; height: 260px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
  .display { font-family: var(--font-display); font-weight: 600; font-size: 96px; line-height: 1.0; letter-spacing: -.025em; color: #fff; }
  .display .it { font-style: italic; color: var(--gold-400); }
  .meta { display: flex; gap: 18px; margin-top: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .meta span strong { color: var(--fg-1); font-family: var(--font-sans); font-weight: 500; margin-right: 4px; }
</style></head><body>
<div class="card">
  <div class="display">Built for the <span class="it">space</span><br>between.</div>
  <div class="meta">
    <span><strong>TT Travels Next</strong>DemiBold 600</span>
    <span><strong>96px</strong>/ 1.0</span>
    <span><strong>-0.025em</strong>tracking</span>
  </div>
</div>
</body></html>
