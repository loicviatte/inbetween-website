<!doctype html><html><head><meta charset="utf-8"><title>Type — weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: #000; overflow: hidden; color: #fff; padding: 20px 28px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 70px 1fr 90px; align-items: baseline; gap: 14px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
  .row:last-child { border-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); letter-spacing: .04em; text-transform: uppercase; }
  .sample { font-size: 24px; letter-spacing: -.01em; }
  .name { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-2); text-align: right; }
</style></head><body>
  <div class="row"><div class="label">100</div><div class="sample" style="font-weight:100">InBetween</div><div class="name">Thin</div></div>
  <div class="row"><div class="label">300</div><div class="sample" style="font-weight:300">InBetween</div><div class="name">Light</div></div>
  <div class="row"><div class="label">400</div><div class="sample" style="font-weight:400">InBetween</div><div class="name">Regular</div></div>
  <div class="row"><div class="label">500</div><div class="sample" style="font-weight:500">InBetween</div><div class="name">Medium</div></div>
  <div class="row"><div class="label">600</div><div class="sample" style="font-weight:600">InBetween</div><div class="name">DemiBold ◄</div></div>
  <div class="row"><div class="label">700</div><div class="sample" style="font-weight:700">InBetween</div><div class="name">Bold</div></div>
  <div class="row"><div class="label">900</div><div class="sample" style="font-weight:900">InBetween</div><div class="name">Black</div></div>
</body></html>
