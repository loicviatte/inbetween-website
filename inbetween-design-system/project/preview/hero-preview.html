<!doctype html><html><head><meta charset="utf-8"><title>Hero preview — light</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; overflow: hidden; font-family: var(--font-sans); height: 100%; color: #0A0A0A; }
  .hero { height: 340px; position: relative; overflow: hidden; background: radial-gradient(120% 90% at 85% 115%, #F9DF9B 0%, #F7F6F3 45%, #EDEBE4 90%); padding: 32px 36px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
  .hero::after { content:""; position:absolute; inset:0; background-image: var(--grain-url); background-size: 220px; opacity: .35; mix-blend-mode: multiply; pointer-events: none; }
  .top { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; }
  .logo { height: 26px; }
  .nav { display: flex; gap: 22px; font-size: 12.5px; color: #5C5C5C; }
  .nav a { color: #5C5C5C; text-decoration: none; }
  .nav a:hover { color: #0A0A0A; }
  .main { position: relative; z-index: 2; max-width: 620px; }
  .eyebrow { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: #8A6820; font-weight: 500; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .eyebrow::before { content: ""; width: 22px; height: 1px; background: currentColor; }
  h1 { font-family: var(--font-display); font-weight: 600; font-size: 60px; line-height: 1.0; letter-spacing: -.025em; margin: 0 0 14px; color: #0A0A0A; }
  h1 em { font-style: italic; font-weight: 600; background: linear-gradient(135deg, #E8B530, #F6D27A); -webkit-background-clip: text; background-clip: text; color: transparent; }
  p { font-weight: 300; font-size: 15px; line-height: 1.55; color: #5C5C5C; max-width: 460px; margin: 0 0 22px; }
  .cta { display: inline-flex; gap: 10px; }
  .btn { font-family: inherit; font-weight: 500; font-size: 14px; padding: 11px 20px; border-radius: 8px; border: 0; cursor: pointer; }
  .btn-primary { background: #0A0A0A; color: #F7F6F3; }
  .btn-ghost { background: transparent; color: #0A0A0A; border: 1px solid rgba(0,0,0,.18); }
</style></head><body>
<div class="hero">
  <div class="top">
    <img class="logo" src="../assets/logo-icon-transparent.png">
    <div class="nav"><a>Product</a><a>Philosophy</a><a>Pricing</a><a>Sign in</a></div>
  </div>
  <div class="main">
    <div class="eyebrow">The infinite / interrupted</div>
    <h1>Built for the <em>space</em> between.</h1>
    <p>A platform for work that lives between systems — where handoffs happen, where context is lost, where the interesting stuff actually is.</p>
    <div class="cta"><button class="btn btn-primary">Request access →</button><button class="btn btn-ghost">See how it works</button></div>
  </div>
</div>
</body></html>
